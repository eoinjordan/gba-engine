name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Unit-test the portable parts of the engine (the bytecode VM/script-runner)
  # with the host toolchain. Fast — no devkitARM, no emulator required.
  unit-tests:
    name: Unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host-side unit tests
        run: make test-unit HOST_CC=gcc

  integration-tests:
    name: Integration tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host-side integration tests
        run: make test-integration HOST_CC=gcc

  # Build an actual .gba ROM with devkitARM to make sure the engine still
  # compiles and links for the real target. This is the part unit tests can't
  # cover — register layout, linker script, ABI, etc.
  e2e-rom-smoke:
    name: E2E ROM smoke
    runs-on: ubuntu-24.04
    container: devkitpro/devkitarm@sha256:15b79ce75822c289538d8153da5fa7aafe5e6adc32ad8a575a197beca0f0761b
    steps:
      - uses: actions/checkout@v4

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install mGBA
        run: |
          apt-get update
          apt-get install -y --no-install-recommends mgba-sdl
          test -x /usr/games/mgba

      - name: Verify pinned devkitPro GBA toolchain
        run: |
          test "$DEVKITPRO" = "/opt/devkitpro"
          test "$DEVKITARM" = "/opt/devkitpro/devkitARM"
          "$DEVKITARM/bin/arm-none-eabi-gcc" --version
          test -x "$DEVKITPRO/tools/bin/gbafix"

      - name: Build .gba ROM
        run: make

      - name: Verify ROM header
        run: |
          test -f bin/game.gba
          ls -la bin/game.gba
          # A ROM fixed up by gbafix is at least large enough to contain the
          # 192-byte GBA header — a cheap sanity check that the build produced
          # a real, finished ROM and not a stray empty file.
          size=$(stat -c%s bin/game.gba)
          echo "ROM size: $size bytes"
          test "$size" -ge 192

      - name: Boot ROM in mGBA
        env:
          GBA_ENGINE_EMULATOR: /usr/games/mgba
          GBA_ENGINE_EMULATOR_TIMEOUT_SECS: 5
        run: make test-e2e

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-rom
          path: bin/game.gba
