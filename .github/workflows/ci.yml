name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Unit-test the portable parts of the engine (the bytecode VM/script-runner)
  # with the host toolchain. Fast — no devkitARM, no emulator required.
  unit-tests:
    name: Unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host-side unit tests
        run: make test-unit HOST_CC=gcc

  integration-tests:
    name: Integration tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host-side integration tests
        run: make test-integration HOST_CC=gcc

  # Build an actual .gba ROM with devkitARM to make sure the engine still
  # compiles and links for the real target. This is the part unit tests can't
  # cover — register layout, linker script, ABI, etc.
  e2e-rom-smoke:
    name: E2E ROM smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install devkitPro GBA toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates apt-transport-https
          echo 'deb [trusted=yes] https://apt.devkitpro.org stable main' \
            | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          sudo dkp-pacman -Sy --needed --noconfirm gba-dev
          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> "$GITHUB_ENV"
          echo "/opt/devkitpro/devkitARM/bin" >> "$GITHUB_PATH"

      - name: Build .gba ROM
        run: make

      - name: Verify ROM header
        run: |
          test -f bin/game.gba
          ls -la bin/game.gba
          # A ROM fixed up by gbafix is at least large enough to contain the
          # 192-byte GBA header — a cheap sanity check that the build produced
          # a real, finished ROM and not a stray empty file.
          size=$(stat -c%s bin/game.gba)
          echo "ROM size: $size bytes"
          test "$size" -ge 192

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-rom
          path: bin/game.gba
